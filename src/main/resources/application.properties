server.port=8081
server.servlet.context-path=/
spring.application.name=collaborative-java-workspace-backend

backend.events.enabled=true
backend.events.port=9091
backend.rmi.enabled=true
backend.rmi.host=127.0.0.1
backend.rmi.port=1099
backend.rmi.service-name=JavaWorkspaceAnalysisService

management.endpoints.web.exposure.include=health,info

spring.datasource.url=jdbc:postgresql://localhost:5432/workspace
spring.datasource.username=postgres
spring.datasource.password=meet
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

app.jwt.secret=replace-with-a-strong-secret-at-least-32-characters-long
app.jwt.expiration-seconds=86400

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true