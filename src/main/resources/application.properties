server.port=8081
server.servlet.context-path=/
spring.application.name=collaborative-java-workspace-backend
spring.config.import=optional:file:.env[.properties]

backend.events.enabled=true
backend.events.port=9091
backend.rmi.enabled=true
backend.rmi.host=127.0.0.1
backend.rmi.port=1099
backend.rmi.service-name=JavaWorkspaceAnalysisService

management.endpoints.web.exposure.include=health,info

spring.datasource.url=jdbc:postgresql://localhost:5432/workspace
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

app.jwt.secret=${APP_JWT_SECRET:change-this-secret-for-prod}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:86400}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true